# This workflow runs whenever a PR is opened or updated, or a commit is pushed to main. It runs
# several checks:
# - fmt: checks that the code is formatted according to rustfmt
# - clippy: checks that the code does not contain any clippy warnin
# - test: runs the tests

# This configuration allows maintainers of this repo to create a branch and pull request based on
# the new branch. Restricting the push trigger to the main branch ensures that the PR only gets
# built once.
on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "src/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust.yml"
      - ".forgejo/workflows/rust.yml"
# If new code is pushed to a PR branch, then cancel in progress workflows for that PR. Ensures that
# we don't waste CI time, and returns results quicker https://github.com/jonhoo/rust-ci-conf/pull/5
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: rust
jobs:
  fmt:
    runs-on: ubuntu-latest
    container: ubuntu:latest
    name: format
    steps:
      - name: Init
        run: |
          apt-get -qq update
          apt-get -qqy install curl nodejs build-essential
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | RUSTUP_COMPONENTS=rustfmt,cargo sh -s -- -y -q --profile default
          export PATH=~/.cargo/bin:$PATH
      - uses: actions/checkout@v6
      - name: Run rustfmt
        run: |
          . ~/.cargo/env
          cargo fmt --check
  test:
    runs-on: ubuntu-latest
    container: ubuntu:latest
    name: test
    steps:
      - name: Init
        run: |
          apt-get -qq update
          apt-get -qqy install curl nodejs build-essential
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | RUSTUP_COMPONENTS=rustc,cargo,clippy sh -s -- -y -q --profile default
      - uses: actions/checkout@v6
      - name: Run tests
        run: |
          . ~/.cargo/env
          cargo test
          cargo clippy --tests -- -Dwarnings
